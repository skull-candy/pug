backend:
  type: apcupsd
  command: ["apcaccess", "status", "localhost:3551"]
  poll_interval_seconds: 3

snmp:
  enabled: true
  listen: "0.0.0.0"
  port: 161
  community: "public"
  developer_log: true

http:
  enabled: true
  listen: "0.0.0.0"
  port: 8080
  api_enabled: true
  prometheus_enabled: true
  homeassistant_enabled: true

mqtt:
  enabled: false
  host: "localhost"
  port: 1883
  client_id: "powerpi-ups-gateway"
  topic_prefix: "powerpi/ups"
  discovery_prefix: "homeassistant"
  username: ""
  password: ""
  publish_interval_seconds: 30

logging:
  level: INFO
  file_path: "/var/log/pug/pug.log"
  apcupsd_events_path: "/var/log/apcupsd.events"
  web_tail_lines: 300

diagnostics:
  self_test_command: ["apctest"]
  self_test_selection: "2"
  battery_calibration_command: ["apctest"]
  battery_calibration_selection: "10"
  command_timeout_seconds: 21600
